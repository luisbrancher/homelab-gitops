# Força a versão da imagem globalmente e em cada componente
image:
  tag: v3.0.3

server:
  image:
    tag: v3.0.3

machine-learning:
  image:
    tag: v3.0.3
  # BLOQUEIO DE INGRESS (Resolve o erro "Immich ML")
  ingress:
    main:
      enabled: false

controllers:
  main:
    containers:
      main:
      # Injeção forçada da imagem para sobrepor o default do chart
        image:
          repository: ghcr.io/immich-app/immich-server
          tag: v3.0.3
        env:
          DB_HOSTNAME: immich-postgres-rw
          DB_USERNAME:
            valueFrom:
              secretKeyRef:
                name: immich-postgres-credentials
                key: username
          DB_PASSWORD:
            valueFrom:
              secretKeyRef:
                name: immich-postgres-credentials
                key: password
          DB_DATABASE_NAME: immich
          REDIS_HOSTNAME: immich-valkey
          IMMICH_MACHINE_LEARNING_URL: http://immich-machine-learning:3003

# Montagem da biblioteca externa (Nextcloud Photos)
extraVolumes:
  - name: nextcloud-photos
    persistentVolumeClaim:
      claimName: immich-nextcloud-photos-pvc
      readOnly: true

extraVolumeMounts:
  - name: nextcloud-photos
    mountPath: /usr/src/app/external
    readOnly: true

# BLOQUEIO DE INGRESS 
valkey:
  enabled: true
  ingress:
    main:
      enabled: false

# Ingress principal
ingress:
  server:
    enabled: true
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
    tls:
      - secretName: immich-tls
        hosts:
          - immich.homelab.luisbrancher.dev
    hosts:
      - host: immich.homelab.luisbrancher.dev
        paths:
          - path: /
            pathType: Prefix

# STORAGE
immich:
  persistence:
    library:
      existingClaim: immich-pvc

podSecurityContext:
  runAsUser: 0
  runAsGroup: 0
  fsGroup: 0