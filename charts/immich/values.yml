# Força a versão da imagem globalmente e em cada componente usando YAML Anchor
x-immich-version: &immich-version "v3.0.3"

controllers:
  main:
    containers:
      main:
        # Injeção forçada da imagem para sobrepor o default do chart
        image:
          repository: ghcr.io/immich-app/immich-server
          tag: *immich-version
        env:
          DB_HOSTNAME: immich-postgres-rw
          DB_USERNAME:
            valueFrom:
              secretKeyRef:
                name: immich-postgres-credentials
                key: username
          DB_PASSWORD:
            valueFrom:
              secretKeyRef:
                name: immich-postgres-credentials
                key: password
          DB_DATABASE_NAME: immich
          REDIS_HOSTNAME: immich-valkey
          IMMICH_MACHINE_LEARNING_URL: http://immich-machine-learning:3003
          # CONFIGURAÇÕES DE OTIMIZAÇÃO E HARDWARE
          IMMICH_HWACCEL: "qsv"
          IMMICH_JOB_CONCURRENCY_TRANSCODING: "1"
          IMMICH_JOB_CONCURRENCY_THUMBNAIL: "1"
          IMMICH_JOB_CONCURRENCY_METADATA_EXTRACTION: "1"
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: "4000m"
            memory: "4Gi"
        securityContext:
          privileged: true

# Configuração de Acesso ao Hardware (QuickSync)
additionalDevices:
  - name: gpu
    type: HostPath
    hostPath: /dev/dri/renderD128
    mountPath: /dev/dri/renderD128

# Configuração exclusiva do painel web
server:
  image:
    tag: *immich-version
  # Ingress principal (aponta corretamente apenas para o server)
  ingress:
    main:
      enabled: true
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
      tls:
        - secretName: immich-tls
          hosts:
            - immich.homelab.luisbrancher.dev
      hosts:
        - host: immich.homelab.luisbrancher.dev
          paths:
            - path: /
              pathType: Prefix

machine-learning:
  image:
    tag: *immich-version
  resources:
    limits:
      cpu: "1000m"
      memory: "2Gi"

valkey:
  enabled: true

# GERENCIAMENTO CENTRALIZADO DE VOLUMES (app-template)
persistence:
  # Montagem da biblioteca externa (Nextcloud Photos)
  nextcloud-photos:
    enabled: true
    existingClaim: immich-nextcloud-photos-pvc
    globalMounts:
      - path: /usr/src/app/external
        readOnly: true

# OBRIGATÓRIO PARA A VALIDAÇÃO DO CHART DO IMMICH
immich:
  persistence:
    library:
      existingClaim: immich-pvc

podSecurityContext:
  runAsUser: 0
  runAsGroup: 0
  fsGroup: 0