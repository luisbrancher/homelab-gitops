image:
  tag: v3.0.3

controllers:
  main:
    containers:
      main:
        env:
          DB_HOSTNAME: immich-postgres-rw
          DB_USERNAME:
            valueFrom:
              secretKeyRef:
                name: immich-postgres-credentials
                key: username
          DB_PASSWORD:
            valueFrom:
              secretKeyRef:
                name: immich-postgres-credentials
                key: password
          DB_DATABASE_NAME: immich
          REDIS_HOSTNAME: immich-valkey
          IMMICH_MACHINE_LEARNING_URL: http://immich-machine-learning:3003
        extraVolumeMounts:
          - name: nextcloud-photos
            mountPath: /usr/src/app/external
            readOnly: true
    extraVolumes:
      - name: nextcloud-photos
        persistentVolumeClaim:
          claimName: immich-nextcloud-photos-pvc

# BLOQUEIO DE INGRESS (Resolve o erro "Immich ML")
machine-learning:
  ingress:
    main:
      enabled: false

valkey:
  enabled: true
  ingress:
    main:
      enabled: false

# Ingress principal
ingress:
  server:
    enabled: true
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
    tls:
      - secretName: immich-tls
        hosts:
          - immich.homelab.luisbrancher.dev
    hosts:
      - host: immich.homelab.luisbrancher.dev
        paths:
          - path: /
            pathType: Prefix

# STORAGE
immich:
  persistence:
    library:
      existingClaim: immich-pvc

podSecurityContext:
  runAsUser: 0
  runAsGroup: 0
  fsGroup: 0