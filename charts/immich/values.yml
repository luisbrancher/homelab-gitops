# Define a versão do Immich em um único lugar usando YAML Anchor
x-immich-version: &immich-version "v3.0.3"

controllers:
  main:
    containers:
      main:
        # Puxa a versão da âncora para atropelar o default do chart
        image:
          repository: ghcr.io/immich-app/immich-server
          tag: *immich-version
        env:
          DB_HOSTNAME: immich-postgres-rw
          DB_USERNAME:
            valueFrom:
              secretKeyRef:
                name: immich-postgres-credentials
                key: username
          DB_PASSWORD:
            valueFrom:
              secretKeyRef:
                name: immich-postgres-credentials
                key: password
          DB_DATABASE_NAME: immich
          REDIS_HOSTNAME: immich-valkey
          IMMICH_MACHINE_LEARNING_URL: http://immich-machine-learning:3003

machine-learning:
  image:
    tag: *immich-version

valkey:
  enabled: true

# Montagem da biblioteca externa (Nextcloud Photos)
extraVolumes:
  - name: nextcloud-photos
    persistentVolumeClaim:
      claimName: immich-nextcloud-photos-pvc
      readOnly: true

extraVolumeMounts:
  - name: nextcloud-photos
    mountPath: /usr/src/app/external
    readOnly: true

# GERENCIAMENTO CENTRALIZADO DE INGRESS
ingress:
  # Ingress principal (ativo)
  server:
    enabled: true
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
    tls:
      - secretName: immich-tls
        hosts:
          - immich.homelab.luisbrancher.dev
    hosts:
      - host: immich.homelab.luisbrancher.dev
        paths:
          - path: /
            pathType: Prefix
  
  # Bloqueia a criação dos ingresses concorrentes
  machine-learning:
    enabled: false
  valkey:
    enabled: false

# STORAGE
immich:
  persistence:
    library:
      existingClaim: immich-pvc

podSecurityContext:
  runAsUser: 0
  runAsGroup: 0
  fsGroup: 0